<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Einsatzübersicht Steiermark</title>

<style>

body{
font-family:Arial;
background:#0b1325;
color:white;
margin:0;
padding:20px;
}

h1{
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
background:#111c36;
}

th,td{
padding:10px;
border-bottom:1px solid #333;
}

th{
background:#18274d;
}

tr:hover{
background:#1c2e5e;
}

.badge{
padding:3px 8px;
border-radius:6px;
font-size:12px;
}

.brand{
background:#c0392b;
}

.tech{
background:#2980b9;
}

</style>
</head>

<body>

<h1>Einsatzübersicht Steiermark</h1>

<table>

<thead>
<tr>
<th>Feuerwehr</th>
<th>Art</th>
<th>Typ</th>
<th>Bereich</th>
<th>Seit</th>
</tr>
</thead>

<tbody id="tbody">

</tbody>

</table>

<script>

async function load(){

const res = await fetch("./current.json");
const data = await res.json();

const tbody=document.getElementById("tbody");

tbody.innerHTML="";

data.features.forEach(f=>{

const p=f.properties;

let artClass="tech";

if((p.Art||"").toLowerCase().includes("brand")) artClass="brand";

tbody.innerHTML+=`
<tr>
<td>${p.Feuerwehr||"-"}</td>
<td><span class="badge ${artClass}">${p.Art||"-"}</span></td>
<td>${p.Typ||"-"}</td>
<td>${p.Bereich||"-"}</td>
<td>${p["Im Einsatz seit"]||"-"}</td>
</tr>
`;

});

}

load();
setInterval(load,60000);

</script>

</body>
</html>
